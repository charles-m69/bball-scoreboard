<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div>
            <h1 id="title">Mat's Scoreboard</h1>

            <div class="container">
                <div class="team-container">
                    <h3>HOME</h3>
                    <div class="scorebox">
                        <h1 class="score-num" id="home-score">0</h1>
                    </div>               
                    <div class="score-buttons">
                        <button class="plus1" onclick="homeAddOne()">+1</button>
                        <button class="plus2" onclick="homeAddTwo()">+2</button>
                        <button class="plus3" onclick="homeAddThree()">+3</button>
                    </div>
                </div>

                <div class="lead-container">
                    <h4 id="lead-title">GAME START</h4>
                    <div class="lead-box">
                        <div class="onlead" id="home-onlead"></div>
                        <div class="line"></div>
                        <div class="onlead" id="guest-onlead"></div>  
                    </div>
                </div>
                
                
                <div class="team-container">
                    <h3>GUEST</h3>
                    <div class="scorebox">
                        <h1 class="score-num" id="guest-score">0</h1>
                    </div>              
                    <div class="score-buttons">
                        <button class="plus1" onclick="guestAddOne()">+1</button>
                        <button class="plus2" onclick="guestAddTwo()">+2</button>
                        <button class="plus3" onclick="guestAddThree()">+3</button>
                    </div>
                    
                </div>
            </div>
            <div class="container-button">
                <button class="new-game" onclick="newGame()">New Game</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
